name: build-orbit-wheels

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: Build wheel (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repo (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python build deps
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build OculOS binary
        run: |
          cd oculos
          cargo build --release
        shell: bash

      - name: Stage OculOS binary into orbit package
        run: |
          mkdir -p orbit/_bin
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp oculos/target/release/oculos.exe orbit/_bin/oculos.exe
          else
            cp oculos/target/release/oculos orbit/_bin/oculos
          fi
        shell: bash

      - name: Build Orbit wheels
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*